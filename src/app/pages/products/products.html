<section class="max-w-7xl mx-auto px-5 py-10">

  <!-- Heading -->

  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between mb-10">

    <div>

      <h1
        class="text-4xl lg:text-5xl font-serif text-[#2E2A28]">

        All Products

        <span class="text-pink-400">♥</span>

      </h1>

      <p class="text-gray-500 mt-2">
        Discover our handmade creations
      </p>

    </div>

    <p class="text-gray-500 mt-4 md:mt-0">

      {{ products.length }} Products

    </p>

  </div>

  <!-- Main Layout -->

  <div
    class="grid lg:grid-cols-[260px_1fr] gap-8">

    <!-- Sidebar -->

    <aside
      class="bg-white
      p-6
      rounded-3xl
      shadow-sm
      border
      border-pink-100
      h-fit">

      <h2
        class="text-xl
        font-semibold
        mb-5">

        Filters

      </h2>

      <div class="space-y-3">

        <!-- All Products -->

        <button
          (click)="showAllProducts()"
          class="block w-full text-left transition hover:text-pink-500"
          [class.text-pink-500]="selectedCategory === ''"
          [class.font-semibold]="selectedCategory === ''">

          All Products

        </button>

        <!-- Crochet -->

        <button
          (click)="filterCategory('Crochet Bouquets')"
          class="block w-full text-left transition hover:text-pink-500"
          [class.text-pink-500]="selectedCategory==='Crochet Bouquets'"
          [class.font-semibold]="selectedCategory==='Crochet Bouquets'">

          Crochet Bouquets

        </button>

        <!-- Hair -->

        <button
          (click)="filterCategory('Hair Accessories')"
          class="block w-full text-left transition hover:text-pink-500"
          [class.text-pink-500]="selectedCategory==='Hair Accessories'"
          [class.font-semibold]="selectedCategory==='Hair Accessories'">

          Hair Accessories

        </button>

        <!-- Keychains -->

        <button
          (click)="filterCategory('Keychains')"
          class="block w-full text-left transition hover:text-pink-500"
          [class.text-pink-500]="selectedCategory==='Keychains'"
          [class.font-semibold]="selectedCategory==='Keychains'">

          Keychains

        </button>

        <!-- Custom Gifts -->

        <button
          (click)="filterCategory('Custom Gifts')"
          class="block w-full text-left transition hover:text-pink-500"
          [class.text-pink-500]="selectedCategory==='Custom Gifts'"
          [class.font-semibold]="selectedCategory==='Custom Gifts'">

          Custom Gifts

        </button>

      </div>

      <hr class="my-6">

      <!-- Sort -->

      <h2
        class="text-xl
        font-semibold
        mb-4">

        Sort By

      </h2>

      <select
        class="w-full border rounded-xl p-3"
        (change)="sortProducts($event)">

        <option value="latest">
          Latest
        </option>

        <option value="low-high">
          Price Low to High
        </option>

        <option value="high-low">
          Price High to Low
        </option>

        <option value="a-z">
          A - Z
        </option>

        <option value="z-a">
          Z - A
        </option>

      </select>

    </aside>

    <!-- Products -->

    <div>

      @if(products.length > 0){

      <div
        class="grid
        grid-cols-2
        md:grid-cols-3
        lg:grid-cols-4
        gap-6">

        @for(product of products; track product._id){

          <app-product-card
            [product]="product">
          </app-product-card>

        }

      </div>

      }

      @else {

      <div
        class="flex
        flex-col
        items-center
        justify-center
        py-24">

        <h2
          class="text-2xl
          font-semibold">

          No Products Found 😔

        </h2>

        <p
          class="text-gray-500
          mt-3">

          Try selecting another category.

        </p>

      </div>

      }

    </div>

  </div>

</section>
