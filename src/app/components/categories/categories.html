<section id="category" class="py-16 px-5 lg:px-10">

  <!-- Heading -->

  <h2
    class="text-center
    text-3xl
    lg:text-5xl
    font-serif
    text-[#2E2A28]
    mb-10">

    Shop by Collection

    <span class="text-pink-400">
      ♥
    </span>

  </h2>

  <!-- Cards -->

  <div
    class="grid
    grid-cols-2
    lg:grid-cols-4
    gap-4
    lg:gap-8">

    <!-- Card 1 -->

    <div
      (click)="openCategory('Crochet Bouquets')"
      class="bg-white
      rounded-3xl
      overflow-hidden
      shadow-sm
      hover:shadow-lg
      hover:-translate-y-2
      transition-all
      duration-300
      cursor-pointer">

      <img
        src="/images/cat-bouquet.png"
        alt="Crochet Bouquets"
        class="w-full h-40 lg:h-56 object-cover">

      <div class="p-4 text-center">

        <h3
          class="font-semibold
          text-lg">

          Crochet Bouquets

        </h3>

        <p
          class="text-sm
          text-gray-500
          mt-1">

          Handmade forever bouquets

        </p>

      </div>

    </div>

    <!-- Card 2 -->

    <div
      (click)="openCategory('Hair Accessories')"
      class="bg-white
      rounded-3xl
      overflow-hidden
      shadow-sm
      hover:shadow-lg
      hover:-translate-y-2
      transition-all
      duration-300
      cursor-pointer">

      <img
        src="/images/cat-hair.png"
        alt="Hair Accessories"
        class="w-full h-40 lg:h-56 object-cover">

      <div class="p-4 text-center">

        <h3
          class="font-semibold
          text-lg">

          Hair Accessories

        </h3>

        <p
          class="text-sm
          text-gray-500
          mt-1">

          Clips, bows & more

        </p>

      </div>

    </div>

    <!-- Card 3 -->

    <div
      (click)="openCategory('Keychains')"
      class="bg-white
      rounded-3xl
      overflow-hidden
      shadow-sm
      hover:shadow-lg
      hover:-translate-y-2
      transition-all
      duration-300
      cursor-pointer">

      <img
        src="/images/cat-keychain.png"
        alt="Keychains"
        class="w-full h-40 lg:h-56 object-cover">

      <div class="p-4 text-center">

        <h3
          class="font-semibold
          text-lg">

          Keychains

        </h3>

        <p
          class="text-sm
          text-gray-500
          mt-1">

          Cute & trendy keychains

        </p>

      </div>

    </div>

    <!-- Card 4 -->

    <div
      (click)="openCategory('Custom Gifts')"
      class="bg-white
      rounded-3xl
      overflow-hidden
      shadow-sm
      hover:shadow-lg
      hover:-translate-y-2
      transition-all
      duration-300
      cursor-pointer">

      <img
        src="/images/cat-custom.png"
        alt="Custom Gifts"
        class="w-full h-40 lg:h-56 object-cover">

      <div class="p-4 text-center">

        <h3
          class="font-semibold
          text-lg">

          Custom Gifts

        </h3>

        <p
          class="text-sm
          text-gray-500
          mt-1">

          Made just for you

        </p>

      </div>

    </div>

  </div>

</section>
